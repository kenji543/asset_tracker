{% extends "assets/base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="form-wrapper">
            <h2>Sign in</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-sm w-100">Login</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
