{% extends "assets/base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="form-wrapper">
            <h2 style="color:#cc4444;">Delete Asset</h2>
            <p class="text-muted" style="font-size:13.5px;">
                Are you sure you want to delete <strong>{{ object.name }}</strong>?
                This action cannot be undone.
            </p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    <a href="{% url 'asset-list' %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
