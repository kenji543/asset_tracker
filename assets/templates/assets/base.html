<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        main { flex: 1; }

        /* ── Navbar ── */
        .site-nav {
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            padding: 0 1.5rem;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .site-nav__brand {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a1a;
            text-decoration: none;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .site-nav__brand i { color: #555; font-size: 13px; }
        .site-nav__brand:hover { color: #1a1a1a; }

        .site-nav__links {
            display: flex;
            gap: 0;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .site-nav__links a {
            color: #666;
            text-decoration: none;
            font-size: 13.5px;
            padding: 0 14px;
            height: 52px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .site-nav__links a:hover,
        .site-nav__links a.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

        .site-nav__right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .site-nav__user {
            font-size: 13px;
            color: #555;
        }
        .site-nav__user span { color: #999; font-size: 12px; }

        /* ── Buttons ── */
        .btn { font-size: 13px; font-weight: 500; border-radius: 6px; }
        .btn-primary {
            background: #1a1a1a;
            border-color: #1a1a1a;
            color: #fff;
        }
        .btn-primary:hover { background: #333; border-color: #333; }
        .btn-outline-secondary {
            color: #555;
            border-color: #d4d4d4;
        }
        .btn-outline-secondary:hover { background: #f5f5f5; color: #1a1a1a; border-color: #bbb; }
        .btn-danger { background: #dc3545; border-color: #dc3545; }
        .btn-link-muted {
            color: #999;
            background: none;
            border: 1px solid #e0e0e0;
            padding: 4px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            transition: background 0.15s;
        }
        .btn-link-muted:hover { background: #f0f0f0; color: #444; }

        /* ── Page heading ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e8e8e8;
        }
        .page-header h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
            color: #1a1a1a;
        }

        /* ── Cards ── */
        .card {
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            box-shadow: none;
            background: #fff;
        }
        .card-header {
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
        }

        /* ── Table ── */
        .table {
            font-size: 13.5px;
            border-collapse: collapse;
        }
        .table thead th {
            background: #f5f5f5;
            color: #555;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e0e0e0;
            border-top: none;
            padding: 10px 14px;
        }
        .table tbody td {
            padding: 11px 14px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
            color: #2a2a2a;
        }
        .table tbody tr:last-child td { border-bottom: none; }
        .table-hover tbody tr:hover td { background: #fafafa; }
        .table-responsive { border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; }

        /* ── Badges ── */
        .badge {
            font-weight: 500;
            font-size: 11.5px;
            border-radius: 4px;
            padding: 3px 8px;
        }
        .badge-user {
            background: #f0f0f0;
            color: #444;
            border: 1px solid #e0e0e0;
        }
        .badge-unassigned {
            background: #f8f8f8;
            color: #aaa;
            border: 1px solid #e8e8e8;
        }

        /* ── Action buttons ── */
        .action-btn {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
            background: #fff;
            color: #666;
            text-decoration: none;
            font-size: 12px;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .action-btn:hover { background: #f5f5f5; color: #1a1a1a; border-color: #bbb; }
        .action-btn.danger { color: #cc4444; border-color: #f0c0c0; }
        .action-btn.danger:hover { background: #fff5f5; border-color: #e08080; }

        /* ── Filter bar ── */
        .filter-bar {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .form-control, .form-select {
            font-size: 13.5px;
            border-color: #e0e0e0;
            border-radius: 6px;
            color: #1a1a1a;
        }
        .form-control:focus, .form-select:focus {
            border-color: #aaa;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.06);
        }

        /* ── Pagination ── */
        .pagination .page-link {
            font-size: 13px;
            color: #555;
            border-color: #e0e0e0;
        }
        .pagination .page-item.active .page-link {
            background: #1a1a1a;
            border-color: #1a1a1a;
            color: #fff;
        }

        /* ── Alerts ── */
        .alert { font-size: 13.5px; border-radius: 7px; }
        .alert-success { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .alert-warning { background: #fffbeb; border-color: #fde68a; color: #92400e; }

        /* ── Footer ── */
        footer {
            border-top: 1px solid #e8e8e8;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            padding: 16px;
            background: #fff;
        }

        /* ── Dashboard stat card ── */
        .stat-card {
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 24px;
            background: #fff;
        }
        .stat-card__label {
            font-size: 12px;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .stat-card__value {
            font-size: 30px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1;
        }

        /* ── Form styling ── */
        .form-wrapper {
            max-width: 520px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 28px;
        }
        .form-wrapper h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
        label { font-size: 13px; font-weight: 500; color: #444; margin-bottom: 4px; }
    </style>
</head>
<body>

<nav class="site-nav">
    <a class="site-nav__brand" href="{% url 'dashboard' %}">
        <i class="fas fa-layer-group"></i> AssetTracker
    </a>

    <ul class="site-nav__links">
        <li><a href="{% url 'dashboard' %}">Dashboard</a></li>
        <li><a href="{% url 'asset-list' %}">Assets</a></li>
    </ul>

    <div class="site-nav__right">
        {% if user.is_authenticated %}
            <span class="site-nav__user">
                {{ user.username }} <span>({{ user.get_role_display }})</span>
            </span>
            {% if user.is_manager_or_admin %}
                <a href="{% url 'register' %}" class="btn-link-muted">New User</a>
            {% endif %}
            <form action="{% url 'logout' %}" method="post" style="display:inline">
                {% csrf_token %}
                <button type="submit" class="btn-link-muted">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Login</a>
        {% endif %}
    </div>
</nav>

<main class="container py-5">
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; {% now "Y" %} AssetTracker
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
